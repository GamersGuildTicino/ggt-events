name: Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: lts/*
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          VITE_INFO_ADDRESS: ${{ vars.VITE_INFO_ADDRESS || secrets.VITE_INFO_ADDRESS }}
          VITE_INSTAGRAM_LINK: ${{ vars.VITE_INSTAGRAM_LINK || secrets.VITE_INSTAGRAM_LINK }}
          VITE_MEMBERSHIP_FORM_LINK: ${{ vars.VITE_MEMBERSHIP_FORM_LINK || secrets.VITE_MEMBERSHIP_FORM_LINK }}
          VITE_SUPABASE_ANON_KEY: ${{ vars.VITE_SUPABASE_ANON_KEY || secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SUPABASE_URL: ${{ vars.VITE_SUPABASE_URL || secrets.VITE_SUPABASE_URL }}
          VITE_WHATS_APP_LINK: ${{ vars.VITE_WHATS_APP_LINK || secrets.VITE_WHATS_APP_LINK }}
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
